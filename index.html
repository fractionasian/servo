<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1d28" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Servo — Perth Fuel Prices</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fuel controls bar -->
  <nav class="controls">
    <div class="fuel-buttons">
      <button class="fuel-btn active" data-fuel="ulp">ULP</button>
      <button class="fuel-btn" data-fuel="pulp">PULP</button>
      <button class="fuel-btn" data-fuel="98">98</button>
      <button class="fuel-btn" data-fuel="diesel">Diesel</button>
    </div>
  </nav>

  <!-- Price summary bar -->
  <div class="price-summary" id="priceSummary"></div>

  <!-- Colour legend -->
  <div class="colour-legend" id="colourLegend">
    <span>Cheapest</span>
    <div class="legend-gradient"></div>
    <span>Most expensive</span>
  </div>

  <!-- Route toggle button (hidden for v1 — routing deferred) -->
  <button class="route-toggle-btn" id="routeToggleBtn" hidden>🧭 Route</button>

  <!-- Route panel -->
  <div class="route-panel" id="routePanel" hidden>
    <div class="route-panel-header">Route planner</div>
    <div class="route-input-group">
      <input type="text" class="route-input" id="fromInput" placeholder="From…" autocomplete="off" />
      <button class="locate-btn" id="locateBtn" title="Use my location">📍</button>
    </div>
    <div class="autocomplete-list" id="fromAutocomplete" hidden></div>
    <div class="route-input-group">
      <input type="text" class="route-input" id="toInput" placeholder="To…" autocomplete="off" />
    </div>
    <div class="autocomplete-list" id="toAutocomplete" hidden></div>
    <div class="route-actions">
      <button class="route-go-btn" id="routeGoBtn">Go</button>
      <button class="route-clear-btn" id="routeClearBtn">Clear</button>
    </div>
  </div>

  <!-- FAB stack — bottom right -->
  <div class="fab-stack">
    <button class="fab" id="brandFilterBtn" title="Filter brands">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
    </button>
    <button class="fab" id="nearbyBtn" title="Cheapest near me">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
    </button>
    <div class="fab-divider"></div>
    <button class="fab" id="zoomInBtn" title="Zoom in">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="fab" id="zoomOutBtn" title="Zoom out">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" hidden>
    <div class="sidebar-header">
      <span id="sidebarTitle">On your route</span>
      <div class="sidebar-controls">
        <button class="sort-toggle" id="sortToggle" title="Sort by distance">↕ Price</button>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" title="Close">✕</button>
      </div>
    </div>
    <div class="sidebar-content" id="sidebarContent">
      <!-- Station cards populated by app.js -->
    </div>
  </aside>

  <!-- Update badge -->
  <div class="update-badge" id="updateBadge"></div>

  <!-- Brand filter modal -->
  <div class="modal-overlay" id="brandModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <span>Filter by brand</span>
        <button class="modal-close" id="brandModalClose">✕</button>
      </div>
      <div class="modal-body" id="brandModalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
